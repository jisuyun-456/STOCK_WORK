name: 📊 Daily Investment Report

on:
  schedule:
    # 평일 08:27 KST = 23:27 UTC (전일)
    - cron: '27 23 * * 0-4'  # Sun-Thu UTC = Mon-Fri KST
  workflow_dispatch:  # 수동 실행 가능

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # portfolio_state.json push 권한
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies (WeasyPrint)
        run: sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libcairo2 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report & send email
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
        working-directory: scripts
        run: python daily_report.py --format all --send

      - name: Commit updated portfolio state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/simulation/portfolio_state.json docs/simulation/ docs/reports/ docs/dashboard.html
          git diff --cached --quiet || git commit -m "chore: 일일 리포트 업데이트 $(date +'%Y-%m-%d')"
          git push

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: |
            docs/reports/*.md
            docs/reports/*.pdf
            docs/simulation/*.md
          retention-days: 30
